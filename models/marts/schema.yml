version: 2

models:
  - name: dim_team
    description: Team dimension for reporting ownership and service-area grouping.
    columns:
      - name: team_id
        tests:
          - not_null
          - unique
      - name: active_flag
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: dim_service_category
    description: Service category dimension for workload and SLA grouping.
    columns:
      - name: category_id
        tests:
          - not_null
          - unique
      - name: sla_eligible_flag
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: fact_service_event
    description: Event-level fact table preserving service event history and sequence.
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: case_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fact_case_performance')
                field: case_id
      - name: team_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id

  - name: fact_case_performance
    description: Case-level fact table for lifecycle, SLA, overdue, and cycle-time reporting.
    columns:
      - name: case_id
        tests:
          - not_null
          - unique
      - name: team_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: category_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_service_category')
                field: category_id
      - name: reporting_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["closed", "cancelled", "paused", "open_overdue", "open_within_sla"]

  - name: mart_service_performance
    description: Management-facing service performance mart by period, team, and category.
    columns:
      - name: reporting_period
        tests:
          - not_null
      - name: team_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: category_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_service_category')
                field: category_id

