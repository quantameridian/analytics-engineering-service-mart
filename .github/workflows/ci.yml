name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  dbt:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install PYTHON=python

      - name: Show dbt version
        run: dbt --version

      - name: Audit Python dependencies
        run: make audit PYTHON=python

      - name: Load seed data
        run: make seed DBT=dbt PROFILES_DIR=.

      - name: Run dbt models
        run: make run DBT=dbt PROFILES_DIR=.

      - name: Run dbt tests
        run: make test DBT=dbt PROFILES_DIR=.

      - name: Generate dbt docs
        run: make docs DBT=dbt PROFILES_DIR=.

      - name: Export mart preview
        run: make preview PYTHON=python
